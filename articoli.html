<!DOCTYPE html>
<html>
<head>
  <title>Aroundo - Territory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #f4f1ea;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* Piccolo overlay futuro per atmosfera */
    .map-overlay {
      position: absolute;
      top: 15px;
      left: 50px;
      z-index: 999;
      background: rgba(255,255,255,0.85);
      padding: 10px 14px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .title {
      font-weight: 600;
      font-size: 14px;
      color: #3f3f3f;
      text-align: center;
    }

    .subtitle {
      font-size: 12px;
      color: #6b6b6b;
      margin-top: 2px;
      text-align: center;
    }
    
    /* marker base animato */
    .pulse {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      position: relative;
    }

    .pulse::before,
    .pulse::after {
      content: "";
      position: absolute;
      top: -8px;
      left: -8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      animation: pulse 1.8s infinite;
      opacity: 0.5;
    }
      .pulse::before {
      z-index: 2;
    }
      .pulse::after {
      z-index: 1;
      opacity: .6;
      animation: pulse 1.8s infinite;
    }
    
@keyframes pulse {
  0% {
    transform: scale(1);
    opacity: 0.6;
  }
  100% {
    transform: scale(2.5);
    opacity: 0;
  }
}
    
  </style>
</head>

<body>

<div class="map-overlay">
  <div class="title">Aroundo</div>
  <div class="subtitle">Discover what’s around you</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // Centro: Sicilia occidentale (coerente con il tuo esempio)
  const map = L.map('map', {
    zoomControl: true
  }).setView([38.0, 12.6], 12); /* sopra/sotto destra/sinistra il'12 indica lo zoom della mappa dalla posizione centrale (Trapani 38.0 12.5) */

  // 🌿 Base map più calda (meno grigia)
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {
      attribution: '&copy; OpenStreetMap & CARTO',
      subdomains: 'abcd',
      maxZoom: 19
    }
  ).addTo(map);

 // 🎨 ICON SET PER CATEGORIE

function createIcon(color) {
  return L.divIcon({
    className: '',
    html: `
      <div 
      class= "pulse"
      style="
        position: relative;
      ">
        <div style="
          background: ${color};
          border-radius: 50%;
          z-index: 2;
        "></div>

        <div style="
          background: ${color};
          border-radius: 50%;
          z-index: 1;
          animation: pulse 1.8s infinite;
          opacity: 0.6;
        "></div>
      </div>
    `,
    iconSize: [20, 20]
  });
}

// 🎭 CATEGORIE (colori semantici Aroundo)

const icons = {
  music: createIcon("#ff4d6d"),        // rosso energia
  food: createIcon("#ffb703"),         // caldo food
  culture: createIcon("#8ecae6"),      // culturale/mare
  sport: createIcon("#06d6a0"),        // verde energia
  nightlife: createIcon("#8338ec"),    // viola notte
  family: createIcon("#f4a261"),       // soft arancio
  outdoor: createIcon("#52b788"),      // natura
};

// 📍 EVENTI SPAZIATI (mock realistico Sicilia occidentale)

const events = [
  {
    name: "Live Jazz Night",
    lat: 38.0176,
    lng: 12.5365,
    type: "music"
  },
  {
    name: "Karaoke",
    lat: 38.0156,
    lng: 12.5465,
    type: "music"
  },
  {
    name: "Street Food Festival",
    lat: 37.9676,
    lng: 12.7481,
    type: "food"
  },
  {
    name: "Sagra della Salsiccia",
    lat: 37.9176,
    lng: 12.7281,
    type: "food"
  },
  {
    name: "Museum Exhibition",
    lat: 37.7933,
    lng: 12.4389,
    type: "culture"
  },
  {
    name: "Beach Yoga Session",
    lat: 37.9330,
    lng: 12.8700,
    type: "sport"
  },
  {
    name: "Night DJ Set",
    lat: 37.8030,
    lng: 12.4470,
    type: "nightlife"
  },
  {
    name: "Kids Playground Event",
    lat: 37.8900,
    lng: 12.6500,
    type: "family"
  },
  {
    name: "Outdoor Trekking Group",
    lat: 38.0500,
    lng: 12.6200,
    type: "outdoor"
  }
];

// RENDER MARKERS

events.forEach(e => {
  L.marker([e.lat, e.lng], { icon: icons[e.type] })
    .addTo(map)
    .bindPopup(`<b>${e.name}</b>`);
});

  

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Aroundo Map</title>

  <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([38.0176, 12.5365], 10);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{
  attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

</script>

</body>
</html>

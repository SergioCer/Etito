<!DOCTYPE html>
<html>
<head>
  <title>Aroundo - Live Territory</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f4f1ea;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* marker base animato */
    .pulse {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: relative;
    }

    .pulse::after {
      content: "";
      position: absolute;
      top: -8px;
      left: -8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      animation: pulse 1.8s infinite;
      opacity: 0.5;
    }

    @keyframes pulse {
      0% { transform: scale(0.6); opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 0; }
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([37.8, 12.6], 9);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {
    attribution: '&copy; OpenStreetMap & CARTO'
  }
).addTo(map);

---

# 🎨 ICON SET PER CATEGORIE

function createIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div class="pulse" style="background:${color}; box-shadow:0 0 12px ${color};"></div>`,
    iconSize: [20, 20]
  });
}

---

# 🎭 CATEGORIE (colori semantici Aroundo)

const icons = {
  music: createIcon("#ff4d6d"),        // rosso energia
  food: createIcon("#ffb703"),         // caldo food
  culture: createIcon("#8ecae6"),      // culturale/mare
  sport: createIcon("#06d6a0"),        // verde energia
  nightlife: createIcon("#8338ec"),    // viola notte
  family: createIcon("#f4a261"),       // soft arancio
  outdoor: createIcon("#52b788"),      // natura
};

---

# 📍 EVENTI SPAZIATI (mock realistico Sicilia occidentale)

const events = [
  {
    name: "Live Jazz Night",
    lat: 38.0176,
    lng: 12.5365,
    type: "music"
  },
  {
    name: "Street Food Festival",
    lat: 37.9676,
    lng: 12.7481,
    type: "food"
  },
  {
    name: "Museum Exhibition",
    lat: 37.7933,
    lng: 12.4389,
    type: "culture"
  },
  {
    name: "Beach Yoga Session",
    lat: 37.9330,
    lng: 12.8700,
    type: "sport"
  },
  {
    name: "Night DJ Set",
    lat: 37.8030,
    lng: 12.4470,
    type: "nightlife"
  },
  {
    name: "Kids Playground Event",
    lat: 37.8900,
    lng: 12.6500,
    type: "family"
  },
  {
    name: "Outdoor Trekking Group",
    lat: 38.0500,
    lng: 12.6200,
    type: "outdoor"
  }
];

---

# 🧠 RENDER MARKERS

events.forEach(e => {
  L.marker([e.lat, e.lng], { icon: icons[e.type] })
    .addTo(map)
    .bindPopup(`<b>${e.name}</b>`);
});

</script>

</body>
</html>

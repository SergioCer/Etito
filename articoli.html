<!DOCTYPE html>
<html>
<head>
  <title>Aroundo - Territory Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #f4f1ea;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* Piccolo overlay futuro per atmosfera */
    .map-overlay {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 999;
      background: rgba(255,255,255,0.85);
      padding: 10px 14px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .title {
      font-weight: 600;
      font-size: 14px;
      color: #3f3f3f;
    }

    .subtitle {
      font-size: 12px;
      color: #6b6b6b;
      margin-top: 2px;
    }
    
    /* marker base animato */
    .pulse {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: relative;
    }

    .pulse::after {
      content: "";
      position: absolute;
      top: -8px;
      left: -8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      animation: pulse 1.8s infinite;
      opacity: 0.5;
    }

    @keyframes pulse {
      0% { transform: scale(0.6); opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    
  </style>
</head>

<body>

<div class="map-overlay">
  <div class="title">Aroundo</div>
  <div class="subtitle">Discover what’s around you</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // Centro: Sicilia occidentale (coerente con il tuo esempio)
  const map = L.map('map', {
    zoomControl: true
  }).setView([38.0, 12.5], 11); /* l'11 indica lo zoom della mappa dalla posizione centrale (Trapani 38.0 12.5) */

  // 🌿 Base map più calda (meno grigia)
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {
      attribution: '&copy; OpenStreetMap & CARTO',
      subdomains: 'abcd',
      maxZoom: 19
    }
  ).addTo(map);

  // 🎯 ESEMPIO: marker evento (placeholder)
  const eventIcon = L.divIcon({
    className: 'event-marker',
    html: `
      <div style="
        width:12px;
        height:12px;
        background:#ff6b6b;
        border-radius:50%;
        box-shadow:0 0 0 6px rgba(255,107,107,0.15);
      "></div>
    `,
    iconSize: [12, 12]
  });

  L.marker([38.0176, 12.5365], { icon: eventIcon })
    .addTo(map)
    .bindPopup("Example Event: Live Music");

</script>

</body>
</html>

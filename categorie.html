<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Categorie</title>
<link rel="stylesheet" href="style.css">
<style>
  #searchCategory {
    width: 300px;
    padding: 5px 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  /* Lista categorie */
  #categoryList {
    margin-top: 20px; /* altezza stimata topBar + eventuali gap */
  }

  #categoryHeader {
    display: flex;
    align-items: center;
    padding: 2px 6px;
    font-weight: bold;
    background-color: #eee;
    position: sticky;
    top: 88px; /* altezza stimata topbar + ricerca */
    z-index: 998;
  }

  #categoryHeader span.desc {
    flex: 1 1 auto;
    text-align: left;
    border-right: 1px solid #ccc;
    padding-right: 5px;
  }

  #categoryHeader span.note {
    flex: 2 1 auto;
    text-align: left;
    border-right: 1px solid #ccc;
    padding-right: 5px;
  }

  #categoryHeader button#deleteCategoryBtn {
    flex: 0 0 auto;
    padding: 3px 8px;
    font-size: 0.9em;
    border-radius: 4px;
    cursor: pointer;
  }

  #categoryHeader button#deleteCategoryBtn.disabled {
    background-color: #ccc;
    color: #666;
    cursor: not-allowed;
  }
</style>
</head>
<body>
<section id="fixedHeader">
  <div id="topBar">
    <a href="index.html">← Home</a>
    <h2>Categorie</h2>
  </div>

  <div class="searchWrapper">
    <input type="text" class="search" placeholder="Cerca categoria...">
    <span class="clear">✖</span>
  </div>

  <div id="categoryHeader">
    <span class="desc">Descrizione</span>
    <span class="note">Note</span>
    <button id="deleteCategoryBtn" class="disabled" disabled>Cancella</button>
  </div>
</section>

<ul id="categoryList"></ul>

<script type="module">
import { supabase } from './supabase.js';

let categories = [];
let selectedLi = null;
let selectedId = null;
let editingInput = null;

// Carica tutte le categorie
async function loadCategories() {
  const { data, error } = await supabase
    .from('categorie')
    .select('*')
    .order('id_categoria', { ascending:true });
  if(error) return alert("Errore caricamento categorie: "+error.message);
  categories = data || [];
  renderCategories(categories);
}

// Rendering lista
function renderCategories(list) {
  const ul = document.getElementById('categoryList');
  ul.innerHTML = '';

  const deleteBtn = document.getElementById('deleteCategoryBtn');

  // Funzione per aggiornare il pulsante header
  function updateDeleteButton(cat) {
    if (!cat) {
      deleteBtn.textContent = 'Cancella';
      deleteBtn.classList.add('disabled');
      deleteBtn.disabled = true;
      return;
    }

    supabase.from('articoli')
      .select('*')
      .eq('id_categoria', cat.id_categoria)
      .then(({ data }) => {
        if (data.length > 0) {
          deleteBtn.textContent = 'NON Cancellabile';
          deleteBtn.classList.add('disabled');
          deleteBtn.disabled = true;
        } else {
          deleteBtn.textContent = 'Cancella';
          deleteBtn.classList.remove('disabled');
          deleteBtn.disabled = false;
        }
      });
  }

  // Creazione righe
  list.forEach(cat => {
    const li = document.createElement('li');

    const selectRow = () => {
      if(selectedLi) selectedLi.classList.remove('selected');
      selectedLi = li;
      selectedId = cat.id_categoria;
      li.classList.add('selected');
      updateDeleteButton(cat);
    };

    // Click su riga
    li.onclick = () => {
      if(editingInput) {
        editingInput.blur();
        setTimeout(selectRow, 0);
      } else {
        selectRow();
      }
    };

    // Descrizione
    const desc = document.createElement('span');
    desc.className = 'desc';
    desc.textContent = cat.cat_descrizione;
    desc.onclick = e => {
      e.stopPropagation();
      if(selectedLi !== li) {
        selectRow();
        return;
      }
      editField(desc, cat, 'cat_descrizione');
    };
    desc.ondblclick = () => window.location.href=`articoli.html?categoria=${cat.id_categoria}`;
    li.appendChild(desc);

    // Note
    const note = document.createElement('span');
    note.className = 'note';
    note.textContent = cat.cat_note || '';
    note.onclick = e => {
      e.stopPropagation();
      if(selectedLi !== li) {
        selectRow();
        return;
      }
      editField(note, cat, 'cat_note');
    };
    li.appendChild(note);

    ul.appendChild(li);
  });

  // Riga nuova categoria
  const newLi = document.createElement('li');
  newLi.className = 'new-category';
  const descInput = document.createElement('input');
  descInput.type = 'text';
  descInput.placeholder = 'Nuova categoria...';
  descInput.style.flex = '1';
  newLi.appendChild(descInput);

  const noteInput = document.createElement('input');
  noteInput.type = 'text';
  noteInput.placeholder = 'Note (facoltativo)';
  noteInput.style.flex = '2';
  newLi.appendChild(noteInput);

  ul.appendChild(newLi);

  // Salvataggio nuova categoria
  let skipBlur = false;
  const handleNewCategory = async () => {
    const descr = descInput.value.trim();
    const note = noteInput.value.trim();
    if (!descr) return;
    skipBlur = true;
    try { await addCategory(descr, note); }
    finally { descInput.value=''; noteInput.value=''; skipBlur=false; }
  };
  descInput.addEventListener('keydown', e=>{if(e.key==='Enter') handleNewCategory();});
  noteInput.addEventListener('keydown', e=>{if(e.key==='Enter') handleNewCategory();});
  descInput.addEventListener('blur', async ()=>{if(!skipBlur) await handleNewCategory();});
  noteInput.addEventListener('blur', async ()=>{if(!skipBlur) await handleNewCategory();});

  // Pulsante header
  deleteBtn.onclick = async () => {
    if (!selectedId) return;
    const cat = categories.find(c => c.id_categoria === selectedId);
    if (!cat) return;
    deleteCategory(cat);
  };
}

// Modifica campo
async function editField(span, cat, field) {
  if(editingInput) return;
  editingInput = span;

  const input = document.createElement('input');
  input.type = 'text';
  input.value = cat[field] || '';
  input.style.flexGrow = (field==='cat_descrizione') ? '1' : '2';
  span.replaceWith(input);
  input.focus();
  input.select();

  const finishEdit = async () => {
    const newVal = input.value.trim();
    if(newVal !== (cat[field]||'')) {
      const { error } = await supabase.from('categorie')
        .update({ [field]: newVal })
        .eq('id_categoria', cat.id_categoria);
      if(error) return alert("Errore modifica: "+error.message);
    }
    input.replaceWith(span);
    editingInput = null;
  };

  input.onkeydown = async e => {
    if(e.key==='Enter') await finishEdit();
    if(e.key==='Escape') { input.replaceWith(span); editingInput=null; }
  };
  input.onblur = async () => await finishEdit();
}

// Eliminazione categoria
async function deleteCategory(cat) {
  try {
    const { data: articoli, error: err1 } = await supabase
      .from('articoli').select('*').eq('id_categoria', cat.id_categoria);
    if(err1) throw err1;
    if(articoli.length>0){ alert("Impossibile eliminare: esistono articoli in questa categoria."); return; }

    if(!confirm(`Eliminare categoria "${cat.cat_descrizione}"?`)) return;

    const { error } = await supabase.from('categorie')
      .delete().eq('id_categoria', cat.id_categoria);
    if(error) throw error;

    if(selectedId === cat.id_categoria){ selectedLi=null; selectedId=null; }

    await loadCategories();
  } catch(e) { alert("Errore cancellazione: "+

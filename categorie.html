<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Categorie</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Prima riga fissa: Home + Titolo */
  #topBar {
    position: sticky;
    top: 0;
    background: #f4f4f9;
    border-bottom: 2px solid #4CAF50;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  #topBar h2 {
    margin: 0;
    font-size: 1.5em;
  }

  #topBar a {
    position: absolute;
    left: 20px;
    font-weight: bold;
    text-decoration: none;
    color: #4CAF50;
  }

  #topBar a:hover { color: #45a049; }

  /* Seconda riga fissa: Ricerca */
  #searchBar {
    position: sticky;
    top: 50px; /* altezza topBar */
    background: #f4f4f9;
    padding: 6px 20px;
    border-bottom: 2px solid #4CAF50;
    z-index: 900;
  }

  #searchCategory {
    width: 300px;
    padding: 6px 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  /* Terza riga fissa: intestazione colonne */
  #categoryHeader {
    display: flex;
    font-weight: bold;
    background-color: #eee;
    padding: 6px 10px;
    border-bottom: 2px solid #4CAF50;
    position: sticky;
    top: 90px; /* altezza topBar + searchBar */
    z-index: 500;
  }

  #categoryHeader span { padding: 0 4px; }
  #categoryHeader span.desc { flex-grow: 1; }
  #categoryHeader span.note { flex-grow: 2; margin-left: 10px; }
  #categoryHeader span.del { width: 40px; text-align: center; }

  /* Lista categorie */
  #categoryList {
    margin: 0;
    padding: 0 20px;
    list-style: none;
  }

  #categoryList li {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    border-bottom: 1px solid #ddd;
  }

  #categoryList li span.desc,
  #categoryList li span.note {
    cursor: pointer;
    flex-shrink: 0;
    padding: 2px 4px;
  }

  #categoryList li span.desc { flex-grow: 1; }
  #categoryList li span.note { flex-grow: 2; margin-left: 10px; }

  .delete-btn {
    background-color: red;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    padding: 2px 6px;
    font-size: 0.85em;
    flex-shrink: 0;
    width: 30px;
    text-align: center;
  }

  .delete-btn:disabled {
    background-color: #ccc;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<!-- Prima riga fissa: Home + Titolo -->
<div id="topBar">
  <a href="index.html">← Home</a>
  <h2>Categorie</h2>
</div>

<!-- Seconda riga fissa: Ricerca -->
<div id="searchBar">
  <input type="text" id="searchCategory" placeholder="Cerca categoria..." oninput="filterCategories()">
</div>

<!-- Terza riga fissa: intestazione colonne -->
<div id="categoryHeader">
  <span class="desc">Descrizione</span>
  <span class="note">Note</span>
  <span class="del">Cancella</span>
</div>

<!-- Lista categorie -->
<ul id="categoryList"></ul>

<script type="module">
import { supabase } from './supabase.js';
let categories = [];

async function loadCategories(){
  const { data, error } = await supabase.from('categorie').select('*').order('id_categoria',{ascending:true});
  if(error) return alert("Errore caricamento categorie: "+error.message);
  categories = data || [];
  renderCategories();
}

function renderCategories(filter=''){
  const ul = document.getElementById('categoryList');
  ul.innerHTML='';

  const filtered = categories.filter(c =>
    c.cat_descrizione.toLowerCase().includes(filter.toLowerCase())
  );

  filtered.forEach(cat => {
    const li = document.createElement('li');

    const desc = document.createElement('span');
    desc.className='desc';
    desc.textContent = cat.cat_descrizione;
    desc.onclick=()=> editField(desc,cat,'cat_descrizione');
    desc.ondblclick=()=> window.location.href=`articoli.html?categoria=${cat.id_categoria}`;
    li.appendChild(desc);

    const note = document.createElement('span');
    note.className='note';
    note.textContent = cat.cat_note || '';
    li.appendChild(note);

    const delBtn = document.createElement('button');
    delBtn.className='delete-btn';
    delBtn.textContent='❌';
    delBtn.onclick=()=> deleteCategory(cat);
    li.appendChild(delBtn);

    ul.appendChild(li);
  });
}

async function editField(span, cat, field){
  const input=document.createElement('input');
  input.type='text';
  input.value=cat[field] || '';
  input.style.flexGrow=(field==='cat_descrizione')?'1':'2';
  span.replaceWith(input);
  input.focus();
  input.onkeydown=async e=>{
    if(e.key==='Enter') await saveEdit(input,cat,field);
    if(e.key==='Escape') input.replaceWith(span);
  };
  input.onblur=async ()=> await saveEdit(input,cat,field);
}

async function saveEdit(input, cat, field){
  const newVal=input.value.trim();
  if(newVal === (cat[field] || '')) { filterCategories(); return; }
  const { error } = await supabase.from('categorie').update({[field]:newVal}).eq('id_categoria',cat.id_categoria);
  if(error) return alert("Errore modifica: "+error.message);
  await loadCategories();
}

async function deleteCategory(cat){
  const { data: articoli } = await supabase.from('articoli').select('*').eq('id_categorie',cat.id_categoria);
  if(articoli.length>0){ alert("Impossibile eliminare: esistono articoli in questa categoria."); return; }
  if(!confirm(`Eliminare categoria "${cat.cat_descrizione}"?`)) return;
  const { error } = await supabase.from('categorie').delete().eq('id_categoria',cat.id_categoria);
  if(error) return alert("Errore cancellazione: "+error.message);
  await loadCategories();
}

function filterCategories(){
  const filter = document.getElementById('searchCategory').value.toLowerCase();
  renderCategories(filter);
}

loadCategories();
</script>

</body>
</html>

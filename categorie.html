<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Categorie</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Barra fissa in alto */
  #topBar {
    position: sticky;
    top: 0;
    background: #f4f4f9;
    padding: 10px 20px;
    border-bottom: 2px solid #4CAF50;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  #topBar a {
    position: absolute;
    left: 20px;
    font-weight: bold;
  }

  #topBar h2 {
    margin: 0;
    font-size: 1.5em;
    text-align: center;
  }

  /* Ricerca fissa sotto barra */
  #searchWrapper {
    position: sticky;
    top: 52px;
    background: #f4f4f9;
    padding: 5px 20px;
    border-bottom: 1px solid #ccc;
    z-index: 999;
  }

  #searchCategory {
    width: 300px;
    padding: 5px 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  /* Header lista categorie */
  #categoryHeader {
    font-weight: bold;
    background-color: #eee;
    display: flex;
    padding: 3px 8px;
    position: sticky;
    top: 88px; 
    z-index: 998;
  }

  #categoryHeader span.desc { flex:1; }
  #categoryHeader span.note { flex:2; margin-left:10px; margin-right:10px; }
  #categoryHeader span.del { width:30px; text-align:right; margin-left:auto; }

  /* Lista categorie */
  #categoryList li {
    display: flex;
    align-items: center;
    padding: 1px 6px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
  }

  #categoryList li.selected {
    background-color: #d0f0d0; /* evidenza riga selezionata */
  }

  #categoryList li span.desc,
  #categoryList li span.note {
    cursor: pointer;
    user-select: none;
  }

  #categoryList li span.desc { flex:1; }
  #categoryList li span.note { flex:2; margin-left:10px; margin-right:10px; }

  .delete-btn {
    background-color: red;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9em;
    flex: 0 0 30px; 
    margin-left: auto;
    padding: 2px 4px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .delete-btn:disabled {
    background-color: #ccc;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div id="topBar">
  <a href="index.html">← Home</a>
  <h2>Categorie</h2>
</div>

<div id="searchWrapper">
  <input type="text" id="searchCategory" placeholder="Cerca categoria...">
</div>

<div id="categoryHeader">
  <span class="desc">Descrizione</span>
  <span class="note">Note</span>
  <span class="del">Cancella</span>
</div>

<ul id="categoryList"></ul>

<script type="module">
  import { supabase } from './supabase.js';
  let categories = [];
  let selectedLi = null;

  async function loadCategories() {
    const { data, error } = await supabase
      .from('categorie')
      .select('*')
      .order('id_categoria', { ascending:true });
    if(error) return alert("Errore caricamento categorie: "+error.message);
    categories = data || [];
    renderCategories(categories);
  }

  function renderCategories(list) {
    const ul = document.getElementById('categoryList');
    ul.innerHTML = '';

    list.forEach(cat => {
      const li = document.createElement('li');

      // Selezione riga
      li.onclick = () => {
        if(selectedLi) selectedLi.classList.remove('selected');
        selectedLi = li;
        li.classList.add('selected');
      };

      // Descrizione
      const desc = document.createElement('span');
      desc.className = 'desc';
      desc.textContent = cat.cat_descrizione;
      desc.onclick = e => {
        e.stopPropagation();
        if(selectedLi === li) editField(desc, cat, 'cat_descrizione');
      };
      desc.ondblclick = () => window.location.href=`articoli.html?categoria=${cat.id_categoria}`;
      li.appendChild(desc);

      // Note
      const note = document.createElement('span');
      note.className = 'note';
      note.textContent = cat.cat_note || '';
      if(cat.cat_note !== null) {
        note.onclick = e => {
          e.stopPropagation();
          if(selectedLi === li) editField(note, cat, 'cat_note');
        };
      }
      li.appendChild(note);

      // Pulsante Cancella
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '❌';
      delBtn.onclick = e => { e.stopPropagation(); deleteCategory(cat); };
      li.appendChild(delBtn);

      ul.appendChild(li);
    });
  }

  // Ricerca live
  const searchInput = document.getElementById('searchCategory');
  searchInput.focus();
  searchInput.addEventListener('input', () => {
    const filter = searchInput.value.toLowerCase();
    const filtered = categories.filter(c => c.cat_descrizione.toLowerCase().includes(filter));
    renderCategories(filtered);
  });

  async function editField(span, cat, field) {
    if(field==='cat_note' && cat.cat_note===null) return; 
    const input = document.createElement('input');
    input.type = 'text';
    input.value = cat[field] || '';
    input.style.flexGrow = (field==='cat_descrizione')?'1':'2';
    span.replaceWith(input);
    input.focus();
    input.select();
    input.onkeydown = async e => {
      if(e.key==='Enter') await saveEdit(input, cat, field);
      if(e.key==='Escape') input.replaceWith(span);
    };
    input.onblur = async () => await saveEdit(input, cat, field);
  }

  async function saveEdit(input, cat, field) {
    const newVal = input.value.trim();
    if(newVal === (cat[field]||'')) { await loadCategories(); return; }
    const { error } = await supabase.from('categorie')
      .update({ [field]: newVal })
      .eq('id_categoria', cat.id_categoria);
    if(error) return alert("Errore modifica: "+error.message);
    await loadCategories();
  }

  async function deleteCategory(cat) {
    const { data: articoli } = await supabase.from('articoli')
      .select('*')
      .eq('id_categorie', cat.id_categoria);
    if(articoli.length>0){ alert("Impossibile eliminare: esistono articoli in questa categoria."); return; }
    if(!confirm(`Eliminare categoria "${cat.cat_descrizione}"?`)) return;
    const { error } = await supabase.from('categorie')
      .delete()
      .eq('id_categoria', cat.id_categoria);
    if(error) return alert("Errore cancellazione: "+error.message);
    await loadCategories();
  }

  loadCategories();
</script>

</body>
</html>

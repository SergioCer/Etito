<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Gestione Categorie</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Gestione Categorie</h1>

<section id="categoriesSection">
<h2>Categorie</h2>
<input type="text" id="newCategory" placeholder="Nome categoria">
<button onclick="addCategory()">Aggiungi Categoria</button>
<ul id="categoryList"></ul>
</section>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const supabaseUrl = 'https://lvtywxtunfmnkmwowxnh.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2dHl3eHR1bmZtbmttd293eG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Njg4MDcsImV4cCI6MjA5NDM0NDgwN30.qq1qPdUxYFcqnv4cA50JMyTBAA5XWKxruL6HEE4-ACM';
  const supabase = createClient(supabaseUrl, supabaseKey);

  async function loadCategories() {
      const { data, error } = await supabase.from('categorie').select('*').order('id_categoria', { ascending: true });
      if (error) return alert("Errore caricamento categorie: " + error.message);

      const ul = document.getElementById('categoryList');
      ul.innerHTML = '';
      data.forEach(cat => {
          const li = document.createElement('li');
          li.textContent = cat.cat_descrizione;
          ul.appendChild(li);
      });
  }

  async function addCategory() {
      const name = document.getElementById('newCategory').value.trim();
      if (!name) return alert("Inserisci nome categoria");
      const { data, error } = await supabase.from('categorie').insert([{ cat_descrizione: name }]).select();
      if (error) return alert("Errore aggiunta categoria: " + error.message);
      document.getElementById('newCategory').value = '';
      await loadCategories();
  }

  loadCategories();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Gestione Categorie</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Gestione Categorie</h1>

<section id="categoriesSection">
  <h2>Categorie</h2>

  <!-- Input per aggiungere nuova categoria -->
  <input type="text" id="newCategory" placeholder="Nome categoria">
  <button onclick="addCategory()">Aggiungi Categoria</button>

  <!-- Filtro di ricerca -->
  <input type="text" id="searchCategory" placeholder="Cerca categoria..." oninput="filterCategories()">

  <!-- Lista categorie -->
  <ul id="categoryList"></ul>
</section>

<script type="module">
  // Import dal modulo centrale
  import { fetchAll, insertRow, updateRow, deleteRow } from './supabase.js';

  let categories = []; // memoria locale categorie

  // Carica tutte le categorie da Supabase
  async function loadCategories() {
    try {
      categories = await fetchAll('categorie');
      renderCategories();
    } catch (error) {
      alert("Errore caricamento categorie: " + error.message);
    }
  }

  // Renderizza la lista categorie
  function renderCategories(filter = '') {
    const ul = document.getElementById('categoryList');
    ul.innerHTML = '';

    categories
      .filter(cat => cat.cat_descrizione.toLowerCase().includes(filter.toLowerCase()))
      .forEach(cat => {
        const li = document.createElement('li');
        li.textContent = cat.cat_descrizione;

        // Pulsante modifica
        const editBtn = document.createElement('button');
        editBtn.textContent = '✏️';
        editBtn.style.marginLeft = '10px';
        editBtn.onclick = () => editCategory(cat);
        li.appendChild(editBtn);

        // Pulsante cancella
        const delBtn = document.createElement('button');
        delBtn.textContent = '🗑️';
        delBtn.style.marginLeft = '5px';
        delBtn.onclick = () => deleteCategory(cat.id_categoria);
        li.appendChild(delBtn);

        ul.appendChild(li);
      });
  }

  // Aggiungi categoria
  async function addCategory() {
    const name = document.getElementById('newCategory').value.trim();
    if (!name) return alert("Inserisci nome categoria");

    try {
      await insertRow('categorie', { cat_descrizione: name });
      document.getElementById('newCategory').value = '';
      await loadCategories();
    } catch (error) {
      alert("Errore aggiunta categoria: " + error.message);
    }
  }

  // Modifica categoria
  async function editCategory(cat) {
    const newName = prompt("Modifica nome categoria:", cat.cat_descrizione);
    if (!newName || newName.trim() === cat.cat_descrizione) return;

    try {
      await updateRow('categorie', 'id_categoria', cat.id_categoria, { cat_descrizione: newName.trim() });
      await loadCategories();
    } catch (error) {
      alert("Errore modifica categoria: " + error.message);
    }
  }

  // Cancella categoria
  async function deleteCategory(id) {
    if (!confirm("Sei sicuro di voler cancellare questa categoria?")) return;

    try {
      await deleteRow('categorie', 'id_categoria', id);
      await loadCategories();
    } catch (error) {
      alert("Errore cancellazione categoria: " + error.message);
    }
  }

  // Filtro di ricerca in tempo reale
  function filterCategories() {
    const filter = document.getElementById('searchCategory').value;
    renderCategories(filter);
  }

  // Caricamento iniziale
  loadCategories();
</script>

</body>
</html>

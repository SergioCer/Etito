<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Categorie</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section id="categoriesSection">
  <h2>Categorie</h2>

  <!-- Filtro di ricerca -->
  <input type="text" id="searchCategory" placeholder="Cerca categoria..." oninput="filterCategories()">

  <!-- Lista categorie -->
  <ul id="categoryList"></ul>
</section>

<p><a href="index.html">← Torna alla home</a></p>

<script type="module">
  import { supabase } from './supabase.js';

  let categories = [];

  // Carica tutte le categorie da Supabase
  async function loadCategories() {
    const { data, error } = await supabase.from('categorie').select('*').order('id_categoria', { ascending: true });
    if (error) return alert("Errore caricamento categorie: " + error.message);

    categories = data || [];
    renderCategories();
  }

  function renderCategories(filter = '') {
    const ul = document.getElementById('categoryList');
    ul.innerHTML = '';

    // Lista categorie esistenti
    categories
      .filter(cat => cat.cat_descrizione.toLowerCase().includes(filter.toLowerCase()))
      .forEach(cat => {
        const li = document.createElement('li');

        const span = document.createElement('span');
        span.textContent = cat.cat_descrizione;
        span.style.flexGrow = '1';
        span.style.cursor = 'pointer';

        // Click: modifica inline
        span.onclick = () => editCategoryInline(span, cat);

        // Doppio click: apri articoli filtrati
        span.ondblclick = () => {
          window.location.href = `articoli.html?categoria=${cat.id_categoria}`;
        };

        li.appendChild(span);

        // Pulsante cancella rosso, disabilitato se ci sono articoli
        const delBtn = document.createElement('button');
        delBtn.textContent = '❌';
        delBtn.className = 'icon-btn';
        delBtn.style.backgroundColor = 'red';
        delBtn.style.marginLeft = '10px';
        delBtn.onclick = async () => deleteCategory(cat);
        li.appendChild(delBtn);

        ul.appendChild(li);
      });

    // Riga finale per aggiungere nuova categoria inline
    const newLi = document.createElement('li');
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Nuova categoria...';
    input.onkeydown = async (e) => {
      if (e.key === 'Enter') {
        await addCategory(input.value);
        input.value = '';
      }
    };
    input.onblur = async () => {
      if (input.value.trim()) {
        await addCategory(input.value);
        input.value = '';
      }
    };
    newLi.appendChild(input);
    ul.appendChild(newLi);
  }

  // Aggiungi nuova categoria
  async function addCategory(name) {
    name = name.trim();
    if (!name) return;

    const { data, error } = await supabase.from('categorie').insert([{ cat_descrizione: name }]).select();
    if (error) return alert("Errore aggiunta categoria: " + error.message);
    await loadCategories();
  }

  // Modifica inline
  function editCategoryInline(span, cat) {
    const input = document.createElement('input');
    input.type = 'text';
    input.value = cat.cat_descrizione;
    input.style.flexGrow = '1';
    span.replaceWith(input);
    input.focus();

    input.onkeydown = async (e) => {
      if (e.key === 'Enter') await saveEdit(input, cat);
      if (e.key === 'Escape') input.replaceWith(span);
    };

    input.onblur = async () => await saveEdit(input, cat);
  }

  async function saveEdit(input, cat) {
    const newName = input.value.trim();
    if (!newName || newName === cat.cat_descrizione) {
      input.replaceWith(document.createTextNode(cat.cat_descrizione));
      await loadCategories();
      return;
    }

    const { error } = await supabase.from('categorie').update({ cat_descrizione: newName }).eq('id_categoria', cat.id_categoria);
    if (error) return alert("Errore modifica categoria: " + error.message);
    await loadCategories();
  }

  // Elimina categoria (disabilitato se articoli collegati)
  async function deleteCategory(cat) {
    // controlla articoli collegati
    const { data: articoli, error: err } = await supabase.from('articoli').select('*').eq('id_categorie', cat.id_categoria);
    if (err) return alert("Errore controllo articoli: " + err.message);

    if (articoli.length > 0) {
      alert("Impossibile eliminare: esistono articoli in questa categoria.");
      return;
    }

    if (!confirm(`Eliminare la categoria "${cat.cat_descrizione}"?`)) return;

    const { error } = await supabase.from('categorie').delete().eq('id_categoria', cat.id_categoria);
    if (error) return alert("Errore cancellazione categoria: " + error.message);

    await loadCategories();
  }

  function filterCategories() {
    const filter = document.getElementById('searchCategory').value;
    renderCategories(filter);
  }

  loadCategories();
</script>

</body>
</html>

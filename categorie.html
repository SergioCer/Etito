<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Categorie</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Barra fissa in alto */
  #topBar {
    position: sticky;
    top: 0;
    background: #f4f4f9;
    padding: 10px 20px;
    border-bottom: 2px solid #4CAF50;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  #topBar a {
    position: absolute;
    left: 20px;
    font-weight: bold;
  }

  #topBar h2 {
    margin: 0;
    font-size: 1.5em;
    text-align: center;
  }

  /* Ricerca fissa sotto barra */
  #searchWrapper {
    position: sticky;
    top: 52px;
    background: #f4f4f9;
    padding: 5px 20px;
    border-bottom: 1px solid #ccc;
    z-index: 999;
  }

  #searchCategory {
    width: 300px;
    padding: 5px 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  /* Header lista categorie */
  #categoryHeader {
    font-weight: bold;
    background-color: #eee;
    display: flex;
    padding: 3px 8px;
    position: sticky;
    top: 88px; 
    z-index: 998;
  }

  #categoryHeader span.desc { flex:1; }
  #categoryHeader span.note { flex:2; margin-left:10px; margin-right:10px; }
  #categoryHeader span.del { width:30px; text-align:right; margin-left:auto; }

</style>
</head>
<body>

<div id="topBar">
  <a href="index.html">← Home</a>
  <h2>Categorie</h2>
</div>

<div id="searchWrapper">
  <input type="text" id="searchCategory" placeholder="Cerca categoria...">
</div>

<div id="categoryHeader">
  <span class="desc">Descrizione</span>
  <span class="note">Note</span>
  <span class="del">Cancella</span>
</div>

<ul id="categoryList"></ul>

<script type="module">
  import { supabase } from './supabase.js';
  let categories = [];

  
  let selectedLi = null;

  // Carica tutte le categorie
  async function loadCategories() {
    const { data, error } = await supabase
      .from('categorie')
      .select('*')
      .order('id_categoria', { ascending:true });
    if(error) return alert("Errore caricamento categorie: "+error.message);
    categories = data || [];
    renderCategories(categories);
  }

// Rendering lista
function renderCategories(list) {
  const ul = document.getElementById('categoryList');
  ul.innerHTML = '';

  list.forEach(cat => {
    const li = document.createElement('li');

    // Funzione di selezione riga
    const selectRow = () => {
    if(selectedLi) selectedLi.classList.remove('selected');
    selectedLi = li;
    selectedId = cat.id_categoria; // ricordiamo quale riga è selezionata
    li.classList.add('selected');
    };

    // Se la riga era già selezionata prima del reload
    if(cat.id_categoria === selectedId) {
    selectRow(); // richiama la funzione invece di duplicare codice
    }    
    
    // Selezione riga anche se clicco su li stesso
    li.onclick = () => selectRow();

    // Descrizione
    const desc = document.createElement('span');
    desc.className = 'desc';
    desc.textContent = cat.cat_descrizione;
    
    desc.onclick = e => {
    e.stopPropagation();
    if(selectedLi !== li) {
    // La riga non era selezionata → seleziona e termina
    selectRow();
    return;
    }
    // La riga era già selezionata → modifica
    editField(desc, cat, 'cat_descrizione');
    };
    
    desc.ondblclick = () => window.location.href=`articoli.html?categoria=${cat.id_categoria}`;
    li.appendChild(desc);

    // Note
    const note = document.createElement('span');
    note.className = 'note';
    note.textContent = cat.cat_note || '';
    note.onclick = e => {
    e.stopPropagation();
    if(selectedLi !== li) {
    selectRow();
    return;
    }
    editField(note, cat, 'cat_note');
    };
    li.appendChild(note);

    // Pulsante Cancella
    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.textContent = '❌';
    delBtn.onclick = e => { 
      e.stopPropagation(); 
      selectRow(); // seleziona la riga prima di cancellare
      deleteCategory(cat); 
    };
    li.appendChild(delBtn);

    ul.appendChild(li);
  });
}

  // Ricerca live
  const searchInput = document.getElementById('searchCategory');
  searchInput.focus();
  searchInput.addEventListener('input', () => {
    const filter = searchInput.value.toLowerCase();
    const filtered = categories.filter(c => c.cat_descrizione.toLowerCase().includes(filter));
    renderCategories(filtered);
  });

  // Modifica campo
async function editField(span, cat, field) {
  const input = document.createElement('input');
  input.type = 'text';
  input.value = cat[field] || '';
  input.style.flexGrow = (field==='cat_descrizione') ? '1' : '2';
  span.replaceWith(input);
  input.focus();
  input.select();

  // Salvataggio "intelligente" e gestione selezione successiva
  const finishEdit = async (event) => {
    const newVal = input.value.trim();
    if(newVal !== (cat[field]||'')) {
      const { error } = await supabase.from('categorie')
        .update({ [field]: newVal })
        .eq('id_categoria', cat.id_categoria);
      if(error) return alert("Errore modifica: "+error.message);
    }
    // Sostituisci input con span originale
    input.replaceWith(span);

    // Se il click successivo era su un altro li della lista, selezionalo
    if(event && event.target.tagName === 'LI') {
      event.target.click(); // forza la selezione del nuovo li
    }
  };

  input.onkeydown = async e => {
    if(e.key === 'Enter') await finishEdit();
    if(e.key === 'Escape') input.replaceWith(span);
  };

  input.onblur = async e => {
    // Non bloccare il click: passiamo l'evento al gestore esterno
    await finishEdit(e);
  };
}

  // Eliminazione categoria
  async function deleteCategory(cat) {
    const { data: articoli } = await supabase.from('articoli')
      .select('*')
      .eq('id_categorie', cat.id_categoria);
    if(articoli.length>0){ alert("Impossibile eliminare: esistono articoli in questa categoria."); return; }
    if(!confirm(`Eliminare categoria "${cat.cat_descrizione}"?`)) return;
    const { error } = await supabase.from('categorie')
      .delete()
      .eq('id_categoria', cat.id_categoria);
    if(error) return alert("Errore cancellazione: "+error.message);
    await loadCategories();
  }

  loadCategories();
</script>

</body>
</html>

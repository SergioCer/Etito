<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Categorie</title>
<link rel="stylesheet" href="style.css">
<style>

/* Intestazione lista categorie */

#categoryList {
  margin-top: 10px; /* altezza stimata topBar + eventuali gap */
}
  
#categoryHeader {
  display: flex;
  align-items: center;
  padding: 2px 6px;
  font-weight: bold;
  background-color: #eee;
  position: sticky;
  top: 88px;
  z-index: 998;
}

#categoryHeader span.desc {
  flex: 0 0 60%; /* Quanto cresce - Quanto si restringe - Dimensione iniziale */
  text-align: left;
  border-right: 1px solid #ccc; /* linea dopo Descrizione */
  padding-right: 5px;           /* spazio dal bordo */
}

#categoryHeader span.note {
  flex: 0 0 30%; /* Quanto cresce - Quanto si restringe - Dimensione iniziale */
  text-align: left;
}
  
#categoryHeader span.delete-Btn {
  flex: 0 0 10%; /* Quanto cresce - Quanto si restringe - Dimensione iniziale */
  text-align: center;
}
  
</style>
</head>
<body>
<section id="fixedHeader">
  
<div id="topBar">
  <a href="index.html">← Home</a>
  <h2>Categorie</h2>
</div>

<div class="searchWrapper">
  <input type="text" class="search" placeholder="Cerca categoria...">
  <span class="clear">✖</span>
</div>
  
<div id="categoryHeader">
  <span class="desc">Descrizione</span>
  <span class="note">Note</span>
  <button id="delete-Btn" class="delete-btn">Cancella</button>
</div>
</section>
  
<ul id="categoryList"></ul>

<script type="module">
  import { supabase } from './supabase.js';
/* Pulsante delete */
  const deleteBtn = document.getElementById('delete-Btn');  
  let categories = [];
  let selectedLi = null;
  let selectedId = null;
  let editingInput = null; // nuovo: tiene traccia se stiamo modificando
  
/* Carica tutte le categorie */
  async function loadCategories() {
    const { data, error } = await supabase
      .from('categorie')
      .select('*')
      .order('id_categoria', { ascending:true });
    if(error) return alert("Errore caricamento categorie: "+error.message);
    categories = data || [];
    renderCategories(categories);
  }

/* Aggiorna la Lista */
function renderCategories(list) {
  const ul = document.getElementById('categoryList');
  ul.innerHTML = '';
  list.forEach(cat => {
    const li = document.createElement('li');

/* Selezione la riga */
    const selectRow = () => {
    if(selectedLi) selectedLi.classList.remove('selected');
    selectedLi = li;
    selectedId = cat.id_categoria; // ricordiamo quale riga è selezionata
    li.classList.add('selected');
    };

/* Se la riga era già selezionata prima del reload */
    if(cat.id_categoria === selectedId) {
    selectRow(); // richiama la funzione invece di duplicare codice
    }    
    
/* Selezione riga anche se clicco su fuori */
    li.onclick = () => {
    if(editingInput) {
/* stiamo modificando: prima chiudi modifica */
    editingInput.blur(); 
/* ritarda leggermente la selezione per assicurarsi che input.onblur finisca */
    setTimeout(() => selectRow(), 0);
    updateDeleteButton(cat);      
    } else {
    selectRow();
    updateDeleteButton(cat);
    }
    };

/* Descrizione */
    const desc = document.createElement('span');
    desc.className = 'desc';
    desc.textContent = cat.cat_descrizione;
    desc.onclick = e => {
    e.stopPropagation();
    if(selectedLi !== li) { // La riga non era selezionata → seleziona e termina
    updateDeleteButton(cat);      
    selectRow();
    return;
    }  /* La riga era già selezionata → modifica */
    editField(desc, cat, 'cat_descrizione');
    };
    
    desc.ondblclick = () => window.location.href=`articoli.html?categoria=${cat.id_categoria}`;
    li.appendChild(desc);

/* Note */
    const note = document.createElement('span');
    note.className = 'note';
    note.textContent = cat.cat_note || '';
    note.onclick = e => {
    e.stopPropagation();
    if(selectedLi !== li) {
    updateDeleteButton(cat);      
    selectRow();
    return;
    }
    editField(note, cat, 'cat_note');
    };
    li.appendChild(note);
    ul.appendChild(li);
  });

  function updateDeleteButton(cat) {
  if (!cat) {
    deleteBtn.textContent = 'Cancella';
    deleteBtn.classList.add('disabled');
    deleteBtn.disabled = true;
    deleteBtn.style.backgroundColor = '#ccc'; /* grigio chiaro quando disabilitato */
    deleteBtn.style.color = '#666'; /* testo grigio scuro */
    return;
  }

/* Controllo articoli collegati */
  supabase.from('articoli')
    .select('*')
    .eq('id_categoria', cat.id_categoria)
    .then(({ data }) => {
      if (data.length > 0) {
        deleteBtn.textContent = 'NON Cancellabile';
        deleteBtn.classList.add('disabled');
        deleteBtn.disabled = true;
        deleteBtn.style.backgroundColor = '#f44336'; /* rosso chiaro */
        deleteBtn.style.color = '#fff'; /* testo bianco */
      } else {
        deleteBtn.textContent = 'Cancella';
        deleteBtn.classList.remove('disabled');
        deleteBtn.disabled = false;
        deleteBtn.style.backgroundColor = '#4CAF50'; /* verde */
        deleteBtn.style.color = '#fff'; /* testo bianco */
      }
    });
}

  updateDeleteButton(null);  // setta lo stato iniziale del pulsante cancella
  
/* Click sul pulsante Cancella */
deleteBtn.onclick = async () => {
  if (!selectedId) return;
  const cat = categories.find(c => c.id_categoria === selectedId);
  if (!cat) return;
  deleteCategory(cat);
};
  
  
/* Riga per nuova Categoria */
const newLi = document.createElement('li');
newLi.className = 'new-category';

const descInput = document.createElement('input');
descInput.type = 'text';
descInput.placeholder = 'Nuova categoria...';
descInput.style.flex = '1';
newLi.appendChild(descInput);

const noteInput = document.createElement('input');
noteInput.type = 'text';
noteInput.placeholder = 'Note (facoltativo)';
noteInput.style.flex = '2';
newLi.appendChild(noteInput);

/* Salvataggio al tasto Enter o cambio campo */
let skipBlur = false; // evita doppio inserimento

/* Funzione unica per aggiungere la categoria */
const handleNewCategory = async () => {
  const descr = descInput.value.trim();
  const note = noteInput.value.trim();
  if (!descr) return;

/* Blocca blur finché finiamo */
  skipBlur = true;

  try {
    await addCategory(descr, note); /* qui avviene il controllo duplicati e inserimento */
  } finally {
/* Pulizia input e sblocco flag */
    descInput.value = '';
    noteInput.value = '';
    skipBlur = false;
  }
};

/* KEYDOWN Enter */
descInput.addEventListener('keydown', async e => {
  if(e.key === 'Enter') await handleNewCategory();
});
noteInput.addEventListener('keydown', async e => {
  if(e.key === 'Enter') await handleNewCategory();
});

/* BLUR */
descInput.addEventListener('blur', async () => {
  if(!skipBlur) await handleNewCategory();
});
noteInput.addEventListener('blur', async () => {
  if(!skipBlur) await handleNewCategory();
});

ul.appendChild(newLi);
  }

/* Modifica campo */
async function editField(span, cat, field) {
  if(editingInput) return; // evita di aprire più input contemporaneamente
  editingInput = span;

  const input = document.createElement('input');
  input.type = 'text';
  input.value = cat[field] || '';
  input.style.flexGrow = (field==='cat_descrizione') ? '1' : '2';
  span.replaceWith(input);
  input.focus();
  input.select();

  const finishEdit = async () => {
    const newVal = input.value.trim();
    if(newVal !== (cat[field]||'')) {
      const { error } = await supabase.from('categorie')
        .update({ [field]: newVal })
        .eq('id_categoria', cat.id_categoria);
      if(error) return alert("Errore modifica: "+error.message);
    }
    input.replaceWith(span);
    editingInput = null;
  };

  input.onkeydown = async e => {
    if(e.key==='Enter') await finishEdit();
    if(e.key==='Escape') {
      input.replaceWith(span);
      editingInput = null;
    }
  };

  input.onblur = async () => await finishEdit();
}

/* Eliminazione categoria */
  async function deleteCategory(cat) {
  try {
    /* Controlla articoli collegati */
    const { data: articoli, error: err1 } = await supabase
      .from('articoli')
      .select('*')
      .eq('id_categoria', cat.id_categoria);
    if(err1) throw err1;
    if(articoli.length > 0){ 
      alert("Impossibile eliminare: esistono articoli in questa categoria."); 
      return; 
    }

/* Conferma Cancellazione */
    if(!confirm(`Eliminare categoria "${cat.cat_descrizione}"?`)) return;

/* Cancellazione effettiva */
    const { error } = await supabase.from('categorie')
      .delete()
      .eq('id_categoria', cat.id_categoria);
    if(error) throw error;

/* Resetta selezione */
    if(selectedId === cat.id_categoria) {
      selectedLi = null;
      selectedId = null;
    }

/* Ricarica lista */
    await loadCategories();
  } catch(e) {
    alert("Errore cancellazione: " + e.message);
  }
}

/* Aggiunge una nuova Categoria */
async function addCategory(name, note = '') {
  name = name.trim();
  if (!name) return;

/* Controllo direttamente sul DB (case-insensitive) */
  try {
    const { data: existing, error: checkError } = await supabase
      .from('categorie')
      .select('id_categoria')
      .ilike('cat_descrizione', name); /* Ricerca case-insensitive */
    if (checkError) throw checkError;
    if (existing && existing.length > 0) {
      alert(`La categoria "${name}" esiste già!`);
      return;
    }
    const { error: insertError } = await supabase
      .from('categorie')
      .insert({ cat_descrizione: name, cat_note: note });
    if (insertError) throw insertError;

/* Aggiorna lista categorie */
    await loadCategories();

  } catch (err) {
    alert("Errore aggiunta categoria: " + err.message);
  }
}

/* Seleziona tutti i campi di ricerca generici */
document.querySelectorAll('.searchWrapper').forEach(wrapper => {
  const input = wrapper.querySelector('input.search');
  const clearBtn = wrapper.querySelector('.clear');

/* Funzione per aggiornare la visibilità della X */
  function toggleClear() {
    clearBtn.style.display = (input.value.length >= 3) ? 'block' : 'none';
  }

/* Controllo iniziale appena carica la pagina */
  toggleClear();

/* Metti focus automatico sul campo di ricerca */
  input.focus();
  
/* Ogni volta che digiti nel campo Ricerca */
    /* Mostra/Nascone la X */
    input.addEventListener('input', () => {
    toggleClear(); 
    const filtro = input.value.trim().toLowerCase();
    /* Filtra le caterorie */
    const filtered = categories.filter(cat =>
    (cat.cat_descrizione || '').toLowerCase().includes(filtro) ||
    (cat.cat_note || '').toLowerCase().includes(filtro)
    );
    /* Rimuove evidenziazione riga selezionata */
    if (selectedLi) {
        selectedLi.classList.remove('selected');
        selectedLi = null;
        selectedId = null;
    }    
    /* Ricarica tutta la lista filtrata */
    renderCategories(filtered);
    /* Aggiorna pulsante delete: disabilitato se non c'è selezione */
    updateDeleteButton(null);    
  });

/* Click sulla X per svuotare l'input */
  clearBtn.addEventListener('click', () => {
    input.value = '';
    toggleClear();
    input.focus();
    /* Rimuove evidenziazione riga selezionata */
    if (selectedLi) {
        selectedLi.classList.remove('selected');
        selectedLi = null;
        selectedId = null;
    }    
    /* Ricarica tutta la lista senza filtro */
    renderCategories(categories);
  });
});
  
  /* Carica inizialmente tutte le categorie */
  loadCategories();
  
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Categorie</title>
<link rel="stylesheet" href="style.css">
<style>

  #searchCategory {
    width: 300px;
    padding: 5px 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  /* Header lista categorie */
#categoryHeader {
  display: flex;
  align-items: center;
  padding: 3px 8px;
  font-weight: bold;
  background-color: #eee;
  position: sticky;
  top: 88px;
  z-index: 998;
}

#categoryHeader span.desc {
  flex: 1 1 auto;
  text-align: left;
}

#categoryHeader span.note {
  flex: 2 1 auto;
  text-align: left;
  margin: 0 5px; /* ridotto */
}

#categoryHeader span.del {
  flex: 0 0 30px; /* larghezza fissa */
  text-align: center;
}
  
</style>
</head>
<body>

<div id="topBar">
  <a href="index.html">← Home</a>
  <h2>Categorie</h2>
</div>

<div id="searchWrapper">
  <input type="text" id="searchCategory" placeholder="Cerca categoria...">
</div>

<div id="categoryHeader">
  <span class="desc">Descrizione</span>
  <span class="note">Note</span>
  <span class="del">Cancella</span>
</div>

<ul id="categoryList"></ul>

<script type="module">
  import { supabase } from './supabase.js';
  let categories = [];
  let selectedLi = null;
  let selectedId = null;
  let editingInput = null; // nuovo: tiene traccia se stiamo modificando
  
  // Carica tutte le categorie
  async function loadCategories() {
    const { data, error } = await supabase
      .from('categorie')
      .select('*')
      .order('id_categoria', { ascending:true });
    if(error) return alert("Errore caricamento categorie: "+error.message);
    categories = data || [];
    renderCategories(categories);
  }

// Rendering lista
function renderCategories(list) {
  const ul = document.getElementById('categoryList');
  ul.innerHTML = '';

  list.forEach(cat => {
    const li = document.createElement('li');

    // Funzione di selezione riga
    const selectRow = () => {
    if(selectedLi) selectedLi.classList.remove('selected');
    selectedLi = li;
    selectedId = cat.id_categoria; // ricordiamo quale riga è selezionata
    li.classList.add('selected');
    };

    // Se la riga era già selezionata prima del reload
    if(cat.id_categoria === selectedId) {
    selectRow(); // richiama la funzione invece di duplicare codice
    }    
    
    // Selezione riga anche se clicco su li stesso
    li.onclick = () => {
    if(editingInput) {
    // stiamo modificando: prima chiudi modifica
    editingInput.blur(); 
    // ritarda leggermente la selezione per assicurarsi che input.onblur finisca
    setTimeout(() => selectRow(), 0);
    } else {
    selectRow();
    }
    };

    // Descrizione
    const desc = document.createElement('span');
    desc.className = 'desc';
    desc.textContent = cat.cat_descrizione;
    
    desc.onclick = e => {
    e.stopPropagation();
    if(selectedLi !== li) {
    // La riga non era selezionata → seleziona e termina
    selectRow();
    return;
    }
    // La riga era già selezionata → modifica
    editField(desc, cat, 'cat_descrizione');
    };
    
    desc.ondblclick = () => window.location.href=`articoli.html?categoria=${cat.id_categoria}`;
    li.appendChild(desc);

    // Note
    const note = document.createElement('span');
    note.className = 'note';
    note.textContent = cat.cat_note || '';
    note.onclick = e => {
    e.stopPropagation();
    if(selectedLi !== li) {
    selectRow();
    return;
    }
    editField(note, cat, 'cat_note');
    };
    li.appendChild(note);

    // Pulsante Cancella
    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.textContent = '❌';
    delBtn.onclick = e => { 
      e.stopPropagation(); 
      selectRow(); // seleziona la riga prima di cancellare
      deleteCategory(cat); 
    };
    li.appendChild(delBtn);

    ul.appendChild(li);
  });

// Riga per nuova categoria
const newLi = document.createElement('li');
newLi.className = 'new-category';

const descInput = document.createElement('input');
descInput.type = 'text';
descInput.placeholder = 'Nuova categoria...';
descInput.style.flex = '1';
newLi.appendChild(descInput);

const noteInput = document.createElement('input');
noteInput.type = 'text';
noteInput.placeholder = 'Note (facoltativo)';
noteInput.style.flex = '2';
newLi.appendChild(noteInput);

// Salvataggio al tasto Enter
descInput.onkeydown = noteInput.onkeydown = async (e) => {
    if (e.key === 'Enter') {
        const descr = descInput.value.trim();
        const note = noteInput.value.trim();
        if(descr) {
            await addCategory({ cat_descrizione: descr, cat_note: note });
            descInput.value = '';
            noteInput.value = '';
        }
    }
};

// Salvataggio al blur
descInput.onblur = noteInput.onblur = async () => {
    const descr = descInput.value.trim();
    const note = noteInput.value.trim();
    if(descr) {
        await addCategory({ cat_descrizione: descr, cat_note: note });
        descInput.value = '';
        noteInput.value = '';
    }
};

ul.appendChild(newLi);
  }

  // Ricerca live
  const searchInput = document.getElementById('searchCategory');
  searchInput.focus();
  searchInput.addEventListener('input', () => {
    const filter = searchInput.value.toLowerCase();
    const filtered = categories.filter(c => c.cat_descrizione.toLowerCase().includes(filter));
    renderCategories(filtered);
  });

  // Modifica campo
async function editField(span, cat, field) {
  if(editingInput) return; // evita di aprire più input contemporaneamente
  editingInput = span;

  const input = document.createElement('input');
  input.type = 'text';
  input.value = cat[field] || '';
  input.style.flexGrow = (field==='cat_descrizione') ? '1' : '2';
  span.replaceWith(input);
  input.focus();
  input.select();

  const finishEdit = async () => {
    const newVal = input.value.trim();
    if(newVal !== (cat[field]||'')) {
      const { error } = await supabase.from('categorie')
        .update({ [field]: newVal })
        .eq('id_categoria', cat.id_categoria);
      if(error) return alert("Errore modifica: "+error.message);
    }
    input.replaceWith(span);
    editingInput = null;
  };

  input.onkeydown = async e => {
    if(e.key==='Enter') await finishEdit();
    if(e.key==='Escape') {
      input.replaceWith(span);
      editingInput = null;
    }
  };

  input.onblur = async () => await finishEdit();
}

  // Eliminazione categoria
  async function deleteCategory(cat) {
    const { data: articoli } = await supabase.from('articoli')
      .select('*')
      .eq('id_categorie', cat.id_categoria);
    if(articoli.length>0){ alert("Impossibile eliminare: esistono articoli in questa categoria."); return; }
    if(!confirm(`Eliminare categoria "${cat.cat_descrizione}"?`)) return;
    const { error } = await supabase.from('categorie')
      .delete()
      .eq('id_categoria', cat.id_categoria);
    if(error) return alert("Errore cancellazione: "+error.message);
    await loadCategories();
  }

async function addCategory(obj){
    if(!obj.cat_descrizione) return;
    const { data, error } = await supabase.from('categorie').insert([obj]).select();
    if(error) return alert("Errore aggiunta: " + error.message);
    await loadCategories();
}
  
  loadCategories();
</script>

</body>
</html>
